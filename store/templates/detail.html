{% load static %}
<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<title>{{ product.name }}</title>

<style>
body {
    font-family: 'Segoe UI';
    background: #0f172a;
    color: white;
}

/* Dark mode support */
body.dark-mode {
    background: #111827;
}

.detail-container {
    max-width: 800px;
    margin: auto;
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
}

/* IMAGE (MUHIIM) */
.detail-container img {
    width: 100%;
    max-width: 350px;
    height: 350px;
    object-fit: cover;
    border-radius: 20px;
    transition: 0.3s;
}

.detail-container img:hover {
    transform: scale(1.05);
}

.download-btn {
    padding: 15px 40px;
    border-radius: 40px;
    display: inline-block;
}

/* Payment logic intact */
.btn-unlocked {
    background: green;
}

.btn-locked {
    background: orange;
}

</style>
</head>

<body>

<div class="detail-container">

    <!-- IMAGE (LABADA SYSTEM intact) -->
    {% if product.image %}
        <img src="{{ product.image.url }}" loading="lazy">
    {% elif product.image_url %}
        <img src="{{ product.image_url }}" loading="lazy">
    {% else %}
        <img src="{% static 'images/logo.png' %}" loading="lazy">
    {% endif %}

    <h1>{{ product.name }}</h1>
    <p>${{ product.price }}</p>

    <p>{{ product.description }}</p>

    <!-- PAYMENT SYSTEM intact -->
    {% if is_approved %}
        <a href="{{ product.download_link }}" class="download-btn btn-unlocked">
            🚀 Download
        </a>
    {% else %}
        <a href="{% url 'request_download' product.id %}" class="download-btn btn-locked">
            🔒 Pay to Download
        </a>
    {% endif %}

    <a href="/">Back</a>

</div>

</body>
</html>

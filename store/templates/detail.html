{% load static %}
<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<title>{{ product.name }}</title>

<style>
body {
    font-family: 'Segoe UI';
    background:#0f172a;
    color:white;
    transition:0.3s;
}

body.dark-mode {
    background:#111827;
}

/* CONTAINER */
.detail-container {
    max-width:800px;
    margin:auto;
    padding:30px;
    background:#1e293b;
    border-radius:20px;
    text-align:center;
}

/* IMAGE */
.detail-container img {
    width:100%;
    max-width:350px;
    height:350px;
    object-fit:cover;
    border-radius:20px;
    transition:0.3s;
}

.detail-container img:hover {
    transform:scale(1.03);
}

/* BUTTON */
.download-btn {
    padding:15px 40px;
    border-radius:40px;
    font-weight:bold;
    display:inline-block;
}

.btn-unlocked { background:#10b981; }
.btn-locked { background:#f59e0b; }

</style>
</head>

<body>

<div class="detail-container">

    <!-- IMAGE LOGIC -->
    {% if product.image %}
        <img src="{{ product.image.url }}" loading="lazy">
    {% elif product.image_url %}
        <img src="{{ product.image_url }}" loading="lazy">
    {% else %}
        <img src="{% static 'images/logo.png' %}" loading="lazy">
    {% endif %}

    <h1>{{ product.name }}</h1>
    <p>${{ product.price }}</p>

    <p>{{ product.description }}</p>

    <!-- PAYMENT SYSTEM (LAMA TAABAN) -->
    {% if is_approved %}
        <a href="{{ product.download_link }}" class="download-btn btn-unlocked">
            🚀 Download
        </a>
    {% else %}
        <a href="{% url 'request_download' product.id %}" class="download-btn btn-locked">
            🔒 Pay to Download
        </a>
    {% endif %}

    <br><br>
    <a href="/">← Back</a>

</div>

<script>
document.body.onclick = () => {
    document.body.classList.toggle('dark-mode');
}
</script>

</body>
</html>

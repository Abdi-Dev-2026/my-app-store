<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .header { border-bottom: 2px solid #38bdf8; padding-bottom: 10px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 12px; border-left: 5px solid #38bdf8; }
        .card h3 { margin: 0; font-size: 14px; color: #94a3b8; text-transform: uppercase; }
        .card p { font-size: 32px; font-weight: bold; margin: 10px 0; color: #38bdf8; }
        .btn-admin { display: inline-block; background: #38bdf8; color: #0f172a; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Maamulka Dukaanka 📊</h1>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Wadarta Earnings</h3>
            <p>$ {{ total_earnings }}</p>
        </div>
        <div class="card">
            <h3>Tirada Macamiisha</h3>
            <p>{{ total_users }}</p>
        </div>
        <div class="card">
            <h3>Downloads Approved</h3>
            <p>{{ total_downloads }}</p>
        </div>
    </div>

    <a href="/admin/store/sitesettings/" class="btn-admin">Dami/Shid Website-ka (Maintenance)</a>
    <br><br>
    <a href="/" style="color: white;">← Ku laabo Website-ka</a>
</body>
</html>
